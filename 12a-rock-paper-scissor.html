<!DOCTYPE html>
<html>

<head>
  <title>Rock Paper Scissor</title>
  <!--this is also a void element used to
  link the html with css file -->
  <link rel="stylesheet" href="styles/12a-rock-paper-scissor.css">
  
</head>

<body>
  <p class="title">Let's Play Rock Paper and Scissors</p>

  <div class="btn">

  <button class="js-style" onclick="
      playGame('✊');
    ">
    ✊
  </button>

  <button class="js-style" onclick="
      playGame('✋');
    ">
    🖐
  </button>

  <button class="js-style" onclick="
      playGame('✌️');
    ">
    ✌️
  </button>

  </div>

  <p class="js-result"></p>
  <p class="js-moves"></p>
  <p class="js-score"></p> <!--paragraph element is also known as block element -> it takes the entir line by itself-->
  <button onclick="resetScore()" class="resetScore">Reset Score</button>
  <button class="askTime" onclick="
    makePopUp();
  ">Auto Play</button>
  <div class="showThePop noShow"></div>

  <!-- in this way we can move the javascript file into a different file and now it will make the code more cleaner -->
  <script src="java_script/12a-rock-paper-scissor.js"></script>
</body>

</html>
