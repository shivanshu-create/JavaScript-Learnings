<!DOCTYPE html>
<html>

<head>
  <title>Booleans Now</title>

</head>

<body>
  <p>Let's Play Rock Paper and Scissors</p>

  <button onclick="
      playGame('Rock');
    ">
    Rock
  </button>

  <button onclick="
      playGame('Paper');
    ">
    Paper
  </button>

  <button onclick="
      playGame('Scissors');
    ">
    Scissors
  </button>

  <button onclick="resetScore()">Reset Score</button>

  <script>

    let Score = JSON.parse(localStorage.getItem('score')) || {
      win: 0,
      lose: 0,
      tie: 0
    }; // if the score is not present in the local storage then it will be initialized to 0
    // if we didn't set the score to 0 then score will be null and we will get an error when we try to access the properties of the score object.

    function resetScore() {
      Score.win = 0;
      Score.lose = 0;
      Score.tie = 0;

      localStorage.removeItem('score'); // removing the score from local storage so that it will not be saved in the browser and will be reset to 0 when the page is refreshed
      
      alert(`Score has been reset\nYour Score: Wins ${Score.win} ,Losses ${Score.lose} ,Ties ${Score.tie}`);
    }

    function playGame(myMove) {
      const computerMove = computerChoice();

      if (myMove === computerMove) {
        Score.tie++;
        
        alert(`I choose ${myMove}, and computer choose ${computerMove},It got Tie\nYour Score: Wins ${Score.win} ,Losses ${Score.lose} ,Ties ${Score.tie}`);
      } else if (
        (myMove === 'Rock' && computerMove === 'Scissors') ||
        (myMove === 'Paper' && computerMove === 'Rock') ||
        (myMove === 'Scissors' && computerMove === 'Paper')
      ) {
        Score.win++;
        
        alert(`I choose ${myMove}, and computer choose ${computerMove},You Won\nYour Score: Wins ${Score.win} ,Losses ${Score.lose} ,Ties ${Score.tie}`);
      } else {
        Score.lose++;
        
        alert(`I choose ${myMove}, and computer choose ${computerMove},You Lose\nYour Score: Wins ${Score.win} ,Losses ${Score.lose} ,Ties ${Score.tie}`);
      }
      localStorage.setItem('score', JSON.stringify(Score)); // this will store the score in the local storage so that it will be saved in the browser and will not be reset to 0 when the page is refreshed
    }

    function computerChoice() {
      const computerTrun = Math.random();
      let computerMove = '';

      if(computerTrun >= 0 && computerTrun < 1/3) computerMove = 'Rock';

      if(computerTrun >= 1/3 && computerTrun < 2/3) computerMove = 'Paper';

      if(computerTrun >= 2/3 && computerTrun < 1) computerMove = 'Scissors';

      return computerMove;
    }
  </script>
</body>

</html>
